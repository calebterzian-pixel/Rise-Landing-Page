<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rise Media Dubai | Apply for Press Coverage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --green: #0B3D2E;
      --gold:  #BC9C5F;
      --cream: #F3E6CE;
      --white: #ffffff;
      --black: #111111;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Lato', sans-serif; min-height: 100vh; overflow-x: hidden; }
    h1, h2 { font-family: 'Crimson Pro', serif; }

    /* ── BACKGROUND ───────────────────────────────────── */
    .bg {
      position: fixed;
      inset: 0;
      background: linear-gradient(158deg, #104838 0%, #0B3D2E 48%, #061c12 100%);
      z-index: -2;
    }

    .bg::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 110% 60% at 50% -5%, rgba(188,156,95,0.12) 0%, transparent 55%),
        radial-gradient(ellipse 55% 60% at 2%  110%, rgba(3,10,6,0.7) 0%, transparent 48%),
        radial-gradient(ellipse 55% 60% at 98% 110%, rgba(3,10,6,0.7) 0%, transparent 48%);
    }

    .bg::after {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(188,156,95,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(188,156,95,0.04) 1px, transparent 1px);
      background-size: 76px 76px;
    }

    /* ── NAV ──────────────────────────────────────────── */
    .nav {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 99;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px 40px;
      background: rgba(11, 61, 46, 0.97);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(188, 156, 95, 0.15);
    }

    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
    }

    .logo-img { height: 90px; width: auto; display: block; }
    .logo-wings { width: 72px; height: auto; display: block; }

    .logo-name {
      font-family: 'Crimson Pro', serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 4px;
      color: var(--gold);
      text-transform: uppercase;
      line-height: 1;
      margin-top: 3px;
    }

    .logo-city {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 8px;
      letter-spacing: 5px;
      color: rgba(188, 156, 95, 0.55);
      text-transform: uppercase;
    }

    /* ── PAGE LAYOUT ──────────────────────────────────── */
    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 110px 24px 60px;
    }

    /* ── CARD ─────────────────────────────────────────── */
    .card {
      background: var(--white);
      width: 100%;
      max-width: 520px;
      padding: 52px 48px 48px;
      position: relative;
    }

    /* Gold top bar */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--gold);
    }

    .step-label {
      display: block;
      font-family: 'Lato', sans-serif;
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 10px;
    }

    .card h2 {
      font-size: 34px;
      font-weight: 700;
      color: var(--green);
      line-height: 1.15;
      margin-bottom: 8px;
    }

    .card-desc {
      font-size: 15px;
      color: #888;
      line-height: 1.65;
      font-weight: 300;
      margin-bottom: 36px;
    }

    /* ── FORM FIELDS ──────────────────────────────────── */
    .field { margin-bottom: 20px; }

    .field label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 8px;
    }

    .field input,
    .field select {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid #e8e8e8;
      font-family: 'Lato', sans-serif;
      font-size: 15px;
      color: var(--black);
      background: #fafafa;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      appearance: none;
      -webkit-appearance: none;
      border-radius: 0;
    }

    .field input:focus,
    .field select:focus {
      border-color: var(--gold);
      background: #fff;
    }

    .field input::placeholder { color: #bbb; }

    .select-wrap { position: relative; }

    .select-wrap::after {
      content: '▾';
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gold);
      pointer-events: none;
      font-size: 14px;
    }

    /* ── SUBMIT ───────────────────────────────────────── */
    .submit {
      width: 100%;
      background: var(--gold);
      color: var(--green);
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 18px;
      border: none;
      cursor: pointer;
      transition: background 0.25s, transform 0.25s, box-shadow 0.25s;
      margin-top: 10px;
    }

    .submit:hover {
      background: #cead75;
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(188, 156, 95, 0.3);
    }

    .privacy {
      text-align: center;
      font-size: 12px;
      color: #bbb;
      margin-top: 16px;
    }

    /* ── RESPONSIVE ───────────────────────────────────── */
    @media (max-width: 580px) {
      .card { padding: 40px 24px 36px; }
      .nav  { padding: 12px 20px; }
    }
  </style>
</head>
<body>

  <div class="bg"></div>

  <!-- NAV -->
  <nav class="nav">
    <a href="index.html" class="logo">
      <img src="logo.jpg" alt="Rise Media Dubai" class="logo-img">
    </a>
  </nav>

  <!-- FORM -->
  <div class="page">
    <div class="card">
      <span class="step-label">Step 1 of 3</span>
      <h2>Tell Us About Your Business</h2>
      <p class="card-desc">Fill in your details and we'll prepare a tailored media strategy before our call.</p>

      <form id="apply-form">
        <div class="field">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="Jane Smith" required />
        </div>

        <div class="field">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="jane@company.com" required />
        </div>

        <div class="field">
          <label for="company">Company / Brand</label>
          <input type="text" id="company" name="company" placeholder="Your company name" required />
        </div>

        <div class="field">
          <label for="budget">Monthly PR Budget</label>
          <div class="select-wrap">
            <select id="budget" name="budget" required>
              <option value="" disabled selected>Select your budget</option>
              <option value="100-500">$100 – $500</option>
              <option value="500-1000">$500 – $1,000</option>
              <option value="1000-5000">$1,000 – $5,000</option>
              <option value="5000-10000">$5,000 – $10,000</option>
              <option value="10000+">$10,000+</option>
            </select>
          </div>
        </div>

        <button type="submit" class="submit">Book My Free Strategy Call →</button>
        <p class="privacy">🔒 Your information is kept private. No spam, ever.</p>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('apply-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      const btn   = this.querySelector('.submit');
      btn.textContent = 'Sending…';
      btn.disabled    = true;

      try {
        const res = await fetch('https://formspree.io/f/xbdqqkbe', {
          method:  'POST',
          body:    new FormData(this),
          headers: { 'Accept': 'application/json' }
        });
        // Proceed to calendar regardless — Formspree handles the email
      } catch (_) {}

      window.location.href = 'calendar.html';
    });
  </script>

</body>
</html>
