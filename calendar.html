<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rise Media Dubai | Book Your Strategy Call</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --green: #0B3D2E;
      --gold:  #BC9C5F;
      --cream: #F3E6CE;
      --white: #ffffff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Lato', sans-serif; min-height: 100vh; overflow-x: hidden; }
    h1, h2 { font-family: 'Crimson Pro', serif; }

    /* ── BACKGROUND ───────────────────────────────────── */
    .bg {
      position: fixed;
      inset: 0;
      background: linear-gradient(158deg, #104838 0%, #0B3D2E 48%, #061c12 100%);
      z-index: -2;
    }

    .bg::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 110% 60% at 50% -5%, rgba(188,156,95,0.12) 0%, transparent 55%),
        radial-gradient(ellipse 55% 60% at 2%  110%, rgba(3,10,6,0.7) 0%, transparent 48%),
        radial-gradient(ellipse 55% 60% at 98% 110%, rgba(3,10,6,0.7) 0%, transparent 48%);
    }

    .bg::after {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(188,156,95,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(188,156,95,0.04) 1px, transparent 1px);
      background-size: 76px 76px;
    }

    /* ── NAV ──────────────────────────────────────────── */
    .nav {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 99;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px 40px;
      background: rgba(11, 61, 46, 0.97);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(188, 156, 95, 0.15);
    }

    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
    }

    .logo-wings { width: 72px; height: auto; display: block; }

    .logo-name {
      font-family: 'Crimson Pro', serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 4px;
      color: var(--gold);
      text-transform: uppercase;
      line-height: 1;
      margin-top: 3px;
    }

    .logo-city {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 8px;
      letter-spacing: 5px;
      color: rgba(188, 156, 95, 0.55);
      text-transform: uppercase;
    }

    /* ── PAGE ─────────────────────────────────────────── */
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 110px 24px 60px;
    }

    /* ── HEADER ───────────────────────────────────────── */
    .header {
      text-align: center;
      margin-bottom: 36px;
    }

    .step-label {
      display: block;
      font-family: 'Lato', sans-serif;
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 12px;
    }

    .header h1 {
      font-size: clamp(28px, 4vw, 46px);
      font-weight: 700;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 12px;
    }

    .header h1 em {
      font-style: italic;
      color: var(--gold);
    }

    .header p {
      font-size: 16px;
      color: rgba(243, 230, 206, 0.65);
      font-weight: 300;
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.65;
    }

    /* ── CALENDLY CARD ────────────────────────────────── */
    .cal-card {
      width: 100%;
      max-width: 900px;
      background: var(--white);
      position: relative;
    }

    /* Gold top bar matching form card */
    .cal-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--gold);
      z-index: 1;
    }

    .calendly-inline-widget {
      width: 100%;
      min-height: 660px;
    }

    /* ── RESPONSIVE ───────────────────────────────────── */
    @media (max-width: 580px) {
      .nav { padding: 12px 20px; }
      .calendly-inline-widget { min-height: 720px; }
    }
  </style>
</head>
<body>

  <div class="bg"></div>

  <!-- NAV -->
  <nav class="nav">
    <a href="index.html" class="logo">
      <svg class="logo-wings" viewBox="0 0 280 100" fill="#BC9C5F" xmlns="http://www.w3.org/2000/svg">
        <path d="M141,92 C140,68 139,40 136,4 C134,40 135,68 139,92 Z"/>
        <path d="M141,92 C135,66 126,38 118,10 C116,40 122,68 138,92 Z"/>
        <path d="M141,92 C128,68 112,46 96,22 C94,48 108,68 137,92 Z"/>
        <path d="M141,92 C122,74 100,58 72,40 C70,64 90,76 136,92 Z"/>
        <path d="M141,92 C114,82 84,70 48,60 C46,78 72,84 135,92 Z"/>
        <path d="M141,92 C108,88 72,86 26,78 C24,88 56,90 134,92 Z"/>
        <path d="M141,92 C106,92 66,92 8,90 C8,94 52,94 134,92 Z"/>
        <path d="M139,92 C140,68 141,40 144,4 C146,40 145,68 141,92 Z"/>
        <path d="M139,92 C145,66 154,38 162,10 C164,40 158,68 142,92 Z"/>
        <path d="M139,92 C152,68 168,46 184,22 C186,48 172,68 143,92 Z"/>
        <path d="M139,92 C158,74 180,58 208,40 C210,64 190,76 144,92 Z"/>
        <path d="M139,92 C166,82 196,70 232,60 C234,78 208,84 145,92 Z"/>
        <path d="M139,92 C172,88 208,86 254,78 C256,88 224,90 146,92 Z"/>
        <path d="M139,92 C174,92 214,92 272,90 C272,94 228,94 146,92 Z"/>
      </svg>
      <span class="logo-name">Rise Media</span>
      <span class="logo-city">Dubai</span>
    </a>
  </nav>

  <!-- CALENDAR -->
  <div class="page">
    <div class="header">
      <span class="step-label">Step 2 of 3</span>
      <h1>Book Your Free<br><em>15-Minute Strategy Call</em></h1>
      <p>Pick a time that works for you. Our PR team will map out exactly how to get your brand in the headlines.</p>
    </div>

    <div class="cal-card">
      <div
        class="calendly-inline-widget"
        data-url="https://calendly.com/pressinquiries/15min?hide_event_type_details=1&hide_gdpr_banner=1&primary_color=BC9C5F"
      ></div>
    </div>
  </div>

  <!-- Calendly widget script -->
  <script src="https://assets.calendly.com/assets/external/widget.js" async></script>

  <!-- Redirect to thank-you page after booking -->
  <script>
    window.addEventListener('message', function (e) {
      if (e.origin === 'https://calendly.com' && e.data.event === 'calendly.event_scheduled') {
        setTimeout(function () {
          window.location.href = 'thankyou.html';
        }, 1500);
      }
    });
  </script>

</body>
</html>
